<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ASCII Animation</title>

    <link rel="stylesheet" href="style.css">
    <style>
    #musicBtn {
    position: fixed;
    right: 20px;
    bottom: 20px;

    width: 60px;
    height: 60px;

    border: none;
    border-radius: 50%;
    background: #ffffff;
    color: #333;
    font-size: 24px;
    cursor: pointer;

    box-shadow: 0 5px 15px rgba(0,0,0,.3);
    z-index: 9999;

    transition: .3s;
}

#musicBtn:hover {
    transform: scale(1.1);
}
    </style>
</head>
<body>

<pre id="ascii"></pre>

<script src="script.js"></script>
 <audio id="myAudio" loop preload="auto">
    <source src="music/blurr.mp3" type="audio/mpeg">
    Browser Anda tidak mendukung audio.
</audio>

<button id="musicBtn" onclick="toggleAudio()" title="Putar Lagu">
    ▶
</button>
<script>
const audio = document.getElementById("myAudio");
const musicBtn = document.getElementById("musicBtn");

function toggleAudio() {
    if (audio.paused) {
        audio.play()
            .then(() => {
                musicBtn.innerHTML = "🎵";
                musicBtn.title = "Matikan Lagu";
            })
            .catch((err) => {
                console.log(err);
                alert("Silakan tekan tombol sekali lagi untuk memulai musik.");
            });
    } else {
        audio.pause();
        musicBtn.innerHTML = "🔇";
        musicBtn.title = "Putar Lagu";
    }
}
</script>

</body>
</html>
